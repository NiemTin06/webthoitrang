<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trang chủ</title>
    <link rel="stylesheet" href="asset/css/reset.css" />
    <link rel="stylesheet" href="asset/css/base.css" />
    <link rel="stylesheet" href="asset/css/style.css" />
  </head>

  <body>
    <header id="header"></header>
    <a href="cart.html"> gio hang </a>
    <a href="productlist.html">trang chu </a>
    <main>
      <article class="cart">
        <div class="container">
          <h1 class="cart__title">GIỎ HÀNG CỦA BẠN</h1>

          <div class="cart__list">
            <div class="cart__item">
              <div class="cart__image">
                <img src="asset/image/product.jpg" alt="" />
              </div>

              <div class="cart__content">
                <h3 class="cart__name">Product</h3>
              </div>

              <div class="cart__right">
                <button class="cart__delete">Xóa</button>

                <div class="cart__price">
                  <span class="cart__price--old">5.000.000đ</span>
                  <span class="cart__price--current">3.500.000đ</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </article>

      <!-- PAYMENT + TOTAL -->
      <section class="checkout">
        <div class="container">
          <div class="checkout__wrap">
            <!-- LEFT -->
            <div class="checkout__payment">
              <h3>Vui lòng chọn hình thức thanh toán</h3>

              <div class="checkout__methods">
                <label><input type="radio" name="payment" /> Momo</label>
                <label><input type="radio" name="payment" /> Ngân hàng</label>
                <label><input type="radio" name="payment" /> VNpay</label>
                <label
                  ><input type="radio" name="payment" /> Thanh toán tiền
                  mặt</label
                >
              </div>
            </div>

            <!-- RIGHT -->
            <div class="checkout__summary">
              <div class="checkout__row checkout__subtotal">
                <span>Tạm tính</span>
                <strong>8.500.000đ</strong>
              </div>

              <div class="checkout__voucher">
                <input type="text" placeholder="Nhập mã giảm giá" />
                <button>Áp dụng</button>
              </div>

              <div class="checkout__row">
                <span>Giảm giá</span>
                <span>-36.000đ</span>
              </div>

              <div class="checkout__row checkout__total">
                <span>Tổng tiền thanh toán</span>
                <strong>8.500.000đ</strong>
              </div>
            </div>
          </div>

          <button class="checkout__pay">Thanh Toán</button>
        </div>
      </section>
    </main>
    
    <footer id="footer"></footer>
    <script type="module" src="asset/js/script.js"></script>
    <script type="module" src="asset/js/drawCart.js"></script>
    <script type="module" src="asset/js/cart.js"></script>
  </body>
</html>
