<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Fullscreen</title>
    <link rel="stylesheet" href="asset/css/base.css">
    <link rel="stylesheet" href="asset/css/signup.css"> 
</head>
<body>

    <div class="container">
        <div class="left-panel">
            <h1>Begin Your Journey</h1>
            <p>Create a new account to explore all features.</p>
        </div>

        <div class="right-panel">
            <div class="form-wrapper">
                <h2>Sign Up</h2>
                <form action="#" method="POST">
                    <div class="input-group">
                        <input type="text" placeholder="Full Name" required>
                    </div>
                    
                    <div class="input-group">
                        <input type="text" placeholder="Username" required>
                    </div>
                    
                    <div class="input-group">
                        <input type="email" placeholder="Email Address" required>
                    </div>
                    
                    <div class="input-group">
                        <input type="password" id="password" placeholder="Password" required>
                    </div>

                    <div class="input-group" style="display: flex; flex-direction: column;">
                        <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                        <span id="passwordError" style="color: red; font-size: 13px; margin-top: 5px; display: none;">
                            Mật khẩu không khớp!
                        </span>
                    </div>
                    
                    <div class="input-group role-group" style="display: flex; gap: 20px; align-items: center; justify-content: start; margin-bottom: 15px; color: #555;">
                        <span style="font-weight: bold;">Register as:</span>
                        <label style="cursor: pointer; display: flex; align-items: center; gap: 5px;">
                            <input type="radio" name="role" value="user" checked required> User
                        </label>
                        <label style="cursor: pointer; display: flex; align-items: center; gap: 5px;">
                            <input type="radio" name="role" value="admin" required> Admin
                        </label>
                    </div>

                    <button type="submit" class="btn-submit">Create Account</button>
                </form>

                <p class="login-link">
                    Already have an account? <a href="login.html">Sign In</a>
                </p>
            </div>
        </div>
    </div>
    <script src ="asset/js/signup.js"></script>
</body>
</html>
