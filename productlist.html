<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Trang chủ </title>
  <link rel="stylesheet" href="asset/css/reset.css">
  <link rel="stylesheet" href="asset/css/base.css">
  <link rel="stylesheet" href="asset/css/category.css">
  <link rel="stylesheet" href="asset/css/productlist.css">
</head>

<body>
  <header id = "header"></header>
  <main>
     <section class="breadcrumb">
      <div class="container">
        <div class="breadcrumb__wrap">
          <div class="breadcrumb__item"><a href="index.html">Trang chủ </a></div>
          <div class="breadcrumb__item active"></div>
        </div>
      </div>
    </section>
    <section class="category">
      <div class="container">
        <h2 class="category__title">Danh mục sản phẩm</h2>
        <div class="category__list"></div>
      </div>
    </section>
    <div class="search">
      <div class="container">
        <input type="text" id = "search">
        <button> Search </button>
        <div class="filter">
          <select id = "filter">
            <option value="mac-dinh">Mac dinh</option>
            <option value="gia-thap-den-cao">gia thap den cao</option>
            <option value="gia-cao-den-thap">Gia cao den thap</option>
            <option value="giam-gia">Giam gia</option>
          </select>
        </div>
      </div>
    </div>
   <!-- PRODUCT LIST -->
    <section class="product">
      <div class="container">
        <h2 class="product__title"> 
          Danh sách sản phẩm
        </h2>
        <div class="product__list"></div>
      </div>
    </section>

  <!-- PAGINATION -->
    <section class="pagination">
        <span class="pagination__button" id="paginationPrev">Prev</span>
        <span class="pagination__number" id="paginationNumber">1</span>
        <span class="pagination__button" id="paginationNext">Next</span>
    </section>
    <!--END PAGINATION -->
    
  </main>
  <footer id = "footer"></footer>

  <script type ="module" src="asset/js/category.js"></script>
  <script type ="module" src="asset/js/product.js"></script>
  <script type ="module" src="asset/js/script.js"></script>
</body>
</html>
