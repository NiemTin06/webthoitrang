<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Trang chủ </title>
  <link rel="stylesheet" href="./node_modules/bootstrap/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="asset/css/reset.css">
  <link rel="stylesheet" href="asset/css/base.css">
  <link rel="stylesheet" href="asset/css/style.css">
</head>

<body>
  <header id = "header"></header>
  <main>
    <a href="cart.html"> gio hang </a>
      <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="index.html">Trang chủ </a></li>
         <li class="breadcrumb-item active" aria-current="page"></li>
      </ol>
    </nav>
    <section class="category">
      <div class="container">
        <h2 class="category__title">Danh muc san pham</h2>
        <div class="category__list"></div>
      </div>
    </section>
    <div class="search">
      <div class="container">
        <input type="text" id = "search">
        <button> Search </button>
        <div class="filter">
          <select id = "filter">
            <option value="mac-dinh">Mac dinh</option>
            <option value="gia-thap-den-cao">gia thap den cao</option>
            <option value="gia-cao-den-thap">Gia cao den thap</option>
            <option value="giam-gia">Giam gia</option>
          </select>
        </div>
      </div>
    </div>
    <section class="product__list">
      <div class="container">
        <h2 class="inner-title">Danh sach san pham</h2>
        <div class="row g-4 align-items-stretch">
          <div class="col-md-3">
            <div class="product-item">
             <img src="asset/image/">
              <h3>Quần</h3>
             <p class="price">200000đ</p>
             <button>Mua ngay</button>
           </div>
         </div>
         <div class="col-md-3">
            <div class="product-item">
             <img src="asset/image/">
              <h3>Áo</h3>
             <p class="price">250000đ</p>
             <button>Mua ngay</button>
           </div>
         </div>
         <div class="col-md-3">
            <div class="product-item">
             <img src="asset/image/">
              <h3>Balo</h3>
             <p class="price">150000đ</p>
             <button>Mua ngay</button>
           </div>
         </div>
         <div class="col-md-3">
            <div class="product-item">
             <img src="asset/image/">
              <h3>Giày</h3>
             <p class="price">250000đ</p>
             <button>Mua ngay</button>
           </div>
         </div>
        </div>
      </div>
    </section>

    <!-- PAGINATION -->
    <section class="pagination text-center mt-4">
      <span class="pagination__button" id="paginationPrev">Prev</span>
      <span class="pagination__number" id="paginationNumber">1</span>
      <span class="pagination__button" id="paginationNext">Next</span>
    </section>
    
  </main>
  <footer id = "footer"></footer>
  <script type ="module" src="asset/js/category.js"></script>
  <script type ="module" src="asset/js/product.js"></script>
  <script type ="module" src="asset/js/script.js"></script>
</body>
</html>
