<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quên mật khẩu</title>
  <link rel="stylesheet" href="asset/css/reset.css">
  <link rel="stylesheet" href="asset/css/base.css">
  <link rel="stylesheet" href="asset/css/login.css">
  <style>
      /* Căn giữa panel vì trang này không cần phần Welcome back (left-panel) */
      .login-container { justify-content: center; }
      .right-panel { width: 400px; max-width: 100%; }
      /* Ẩn bước 2 (Tạo mật khẩu) lúc mới vào trang */
      #step2 { display: none; }
  </style>
</head>
<body>
  <div class="login-container">
        <div class="right-panel">
            
            <div id="step1">
                <h2>Reset Password</h2>
                <p style="margin-bottom: 20px; color: #666;">Nhập email của bạn để lấy lại mật khẩu.</p>
                
                <form id="emailForm">
                    <div class="input-group">
                        <input type="email" placeholder="Your email address" required>
                    </div>
                    <button type="submit" class="btn-signin">Tiếp tục</button>
                </form>
                
                <p class="signup-link"><a href="index.html">Quay lại Đăng nhập</a></p>
            </div>

            <div id="step2">
                <h2>New Password</h2>
                <p style="margin-bottom: 20px; color: #666;">Vui lòng tạo mật khẩu mới.</p>
                
                <form id="newPasswordForm">
                    <div class="input-group">
                        <input type="password" placeholder="New Password" required minlength="6">
                    </div>
                    <div class="input-group">
                        <input type="password" placeholder="Confirm New Password" required minlength="6">
                    </div>
                    <button type="submit" class="btn-signin">Cập nhật mật khẩu</button>
                </form>
            </div>

        </div>
    </div>

  <script>
      const emailForm = document.getElementById('emailForm');
      const newPasswordForm = document.getElementById('newPasswordForm');
      const step1 = document.getElementById('step1');
      const step2 = document.getElementById('step2');

      // Khi submit email -> Ẩn bước 1, hiện bước 2
      emailForm.addEventListener('submit', function(e) {
          e.preventDefault(); // Ngăn load lại trang
          step1.style.display = 'none';
          step2.style.display = 'block';
      });

      // Khi submit mật khẩu mới -> Thông báo và quay về trang đăng nhập
      newPasswordForm.addEventListener('submit', function(e) {
          e.preventDefault();
          alert('Đổi mật khẩu thành công!');
          window.location.href = 'index.html'; // Tên file trang đăng nhập của bạn
      });
  </script>
</body>
</html>
