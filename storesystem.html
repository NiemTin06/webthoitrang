<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống cửa hàng</title>

    <link rel="stylesheet" href="asset/css/reset.css">
    <link rel="stylesheet" href="asset/css/base.css">
    <link rel="stylesheet" href="asset/css/storesystem.css">
</head>

<body>

<header class="header"></header>

<main>
    <section class="store-system">

        <h1 class="store-title">
            Hệ thống chi nhánh cửa hàng
        </h1>

        <div class="store-list">

            <!-- ITEM -->
            <article class="store-item">
                <img src="asset/image/store/store1.jpeg" alt="Chi nhánh Cần Thơ">

                <div class="store-info">
                    <h3>Chi nhánh Cần Thơ</h3>
                    <p><strong>Địa chỉ:</strong> Ninh Kiều</p>
                    <p><strong>Điện thoại:</strong> 0123456789</p>
                    <p><strong>Giờ mở cửa:</strong> 8:00 - 22:00</p>

                    <button class="store-btn">Xem chi tiết</button>
                </div>
            </article>

            <!-- ITEM -->
            <article class="store-item">
                <img src="asset/image/store/store2.jpeg" alt="Chi nhánh TP.HCM">

                <div class="store-info">
                    <h3>Chi nhánh TP.HCM</h3>
                    <p><strong>Địa chỉ:</strong> Quận 1</p>
                    <p><strong>Điện thoại:</strong> 0987654321</p>
                    <p><strong>Giờ mở cửa:</strong> 8:00 - 22:00</p>

                    <button class="store-btn">Xem chi tiết</button>
                </div>
            </article>

            <!-- ITEM -->
            <article class="store-item">
                <img src="asset/image/store/store3.jpeg" alt="Chi nhánh Thanh Hóa">

                <div class="store-info">
                    <h3>Chi nhánh Thanh Hóa</h3>
                    <p><strong>Địa chỉ:</strong> Hạc Thành</p>
                    <p><strong>Điện thoại:</strong> 3636363636</p>
                    <p><strong>Giờ mở cửa:</strong> 8:00 - 22:00</p>

                    <button class="store-btn">Xem chi tiết</button>
                </div>
            </article>

        </div>

    </section>
</main>
<footer class="footer"></footer>
<script type="module"  src="asset/js/script.js"></script>
</body>
</html>
